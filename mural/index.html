<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Fãs | Gilberto</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #e5ddd5; margin: 0; }
        
        /* Bloqueio inicial: só mostra o conteúdo se o JS autorizar */
        #main-content { display: none; flex-direction: column; height: 100vh; }
        
        header { background: #075e54; color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #logout { color: #afffdf; text-decoration: none; font-size: 0.8rem; }
        
        #messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        .bubble { background: white; padding: 10px 15px; border-radius: 10px; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
        .bubble.admin { align-self: flex-end; background: #dcf8c6; }
        .bubble .author { font-size: 0.75rem; color: #27ae60; font-weight: bold; display: block; margin-bottom: 3px; }
        
        #input-area { padding: 15px; background: #f0f0f0; display: none; gap: 10px; }
        #input-area input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        #input-area button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-content">
        <header>
            Mural do Gilberto
            <a href="#" id="logoutBtn">Sair</a>
        </header>

        <div id="messages-container"></div>

        <div id="input-area">
            <input type="text" id="messageInput" placeholder="Escreva uma mensagem...">
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoaKpA1S75MWVJj1y3eynT3oPfVn30zDY",
            authDomain: "gilberto-a4032.firebaseapp.com",
            projectId: "gilberto-a4032",
            storageBucket: "gilberto-a4032.firebasestorage.app",
            messagingSenderId: "757870949382",
            appId: "1:757870949382:web:b7ad6e42e04a3fb874ff87"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const gilbertoEmail = "gilbertolopesj@gmail.com"; 

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            // Verificação de Autorização
            const docRef = doc(db, "acesso", user.email);
            const docSnap = await getDoc(docRef);

            if (user.email === gilbertoEmail || (docSnap.exists() && docSnap.data().autorizado === true)) {
                // Usuário autorizado
                document.getElementById('main-content').style.display = 'flex';
                
                // Grava log de visita (Estatística)
                addDoc(collection(db, "logs"), { 
                    nome: user.displayName, 
                    email: user.email, 
                    data: serverTimestamp() 
                });

                // Se for o Gilberto, mostra campo de postagem
                if (user.email === gilbertoEmail) {
                    document.getElementById('input-area').style.display = 'flex';
                }

                carregarMensagens();
            } else {
                alert("Acesso Negado. Você não está na lista de convidados.");
                signOut(auth).then(() => { window.location.href = "login.html"; });
            }
        });

        // Carregar do Banco
        function carregarMensagens() {
            const q = query(collection(db, "mensagens"), orderBy("tempo", "asc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const d = doc.data();
                    const bubble = document.createElement('div');
                    bubble.classList.add('bubble');
                    if(d.autor === "Gilberto") bubble.classList.add('admin');
                    
                    bubble.innerHTML = `<span class="author">${d.autor}</span>${d.texto}`;
                    container.appendChild(bubble);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        // Postar Mensagem
        document.getElementById('sendBtn').onclick = () => {
            const input = document.getElementById('messageInput');
            if(input.value.trim() !== "") {
                addDoc(collection(db, "mensagens"), {
                    texto: input.value,
                    autor: "Gilberto",
                    tempo: serverTimestamp()
                });
                input.value = "";
            }
        };

        // Botão Sair
        document.getElementById('logoutBtn').onclick = () => {
            signOut(auth).then(() => { window.location.href = "login.html"; });
        };
    </script>
</body>
</html>
