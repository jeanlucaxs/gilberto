<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural do Gilberto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #075e54; --bg: #e5ddd5; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        
        #app { display: none; flex-direction: column; width: 100%; max-width: 600px; background: white; position: relative; }

        /* HEADER */
        header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #menu-btn { cursor: pointer; font-size: 1.5rem; display: none; padding: 5px; }
        
        /* MENU LATERAL */
        #side-menu { 
            position: absolute; left: -100%; top: 0; width: 280px; height: 100%; 
            background: white; z-index: 200; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            padding: 20px; display: flex; flex-direction: column;
        }
        #side-menu.open { left: 0; }
        .overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 150; }

        /* SEÇÃO DE ENQUETE / RESPONDE AÍ */
        #interacao-topo { background: #fff3cd; padding: 15px; border-bottom: 2px solid #ffeeba; display: none; }
        .btn-voto { background: white; border: 1px solid var(--primary); color: var(--primary); padding: 8px; border-radius: 20px; margin: 5px 0; cursor: pointer; width: 100%; font-weight: 600; }
        .btn-voto:hover { background: var(--primary); color: white; }

        /* MENSAGENS */
        #messages-container { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
        }

        .bubble { padding: 10px 15px; border-radius: 12px; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); line-height: 1.4; position: relative; }
        .bubble.is-admin-true { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 2px; }
        .bubble.is-admin-false { background: #ffffff; align-self: flex-start; border-top-left-radius: 2px; }

        .author-tag { font-size: 0.7rem; font-weight: 700; color: var(--primary); display: block; margin-bottom: 3px; }

        /* BARRA DE ENVIO */
        #admin-controls { display: none; padding: 12px; background: #f0f0f0; border-top: 1px solid #ddd; }
        .input-group { display: flex; gap: 8px; }
        input[type="text"] { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        #sendBtn { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-weight: 600; }

        .admin-form { background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="app">
        <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
        
        <div id="side-menu">
            <h3 style="color: var(--primary); margin-top: 0;">Painel Admin</h3>
            
            <div id="admin-tools-extra" style="display:none;">
                <div class="admin-form">
                    <strong>Nova Enquete</strong>
                    <input type="text" id="pollQuest" placeholder="Pergunta da enquete" style="width:90%; margin:5px 0;">
                    <input type="text" id="pollOpt1" placeholder="Opção 1" style="width:90%; margin:5px 0;">
                    <input type="text" id="pollOpt2" placeholder="Opção 2" style="width:90%; margin:5px 0;">
                    <button onclick="criarEnquete()" style="font-size: 0.7rem;">Lançar Enquete</button>
                </div>
                <hr>
                <h4 style="font-size: 0.8rem; color: #999;">VISITANTES</h4>
                <div id="logs-list"></div>
            </div>

            <button onclick="sair()" style="width:100%; padding:12px; background: #f44336; color: white; border: none; border-radius: 8px; cursor:pointer; font-weight: bold; margin-top: auto;">Sair</button>
        </div>

        <header>
            <div id="menu-btn" onclick="toggleMenu()">☰</div>
            <div style="text-align: center; flex: 1;">
                <span style="font-weight: 600; font-size: 1.1rem;">Mural do Gilberto</span><br>
                <small id="user-display-name" style="opacity: 0.8; font-size: 0.7rem;"></small>
            </div>
            <div id="spacer" style="width: 34px;"></div>
        </header>

        <div id="interacao-topo">
            <strong id="interacao-pergunta"></strong>
            <div id="interacao-opcoes"></div>
        </div>

        <div id="messages-container"></div>

        <div id="admin-controls">
            <div class="input-group">
                <input type="text" id="msgInput" placeholder="Mandar mensagem oficial...">
                <button id="sendBtn">Enviar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoaKpA1S75MWVJj1y3eynT3oPfVn30zDY",
            authDomain: "gilberto-a4032.firebaseapp.com",
            projectId: "gilberto-a4032",
            storageBucket: "gilberto-a4032.firebasestorage.app",
            messagingSenderId: "757870949382",
            appId: "1:757870949382:web:b7ad6e42e04a3fb874ff87"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserNome = "";
        let isUserADM = false;

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "../login/"; return; }

            const admRef = doc(db, "acessoadm", user.email);
            const admSnap = await getDoc(admRef);
            const fãRef = doc(db, "acesso", user.email);
            const fãSnap = await getDoc(fãRef);

            if (admSnap.exists() || fãSnap.exists()) {
                isUserADM = admSnap.exists();
                currentUserNome = isUserADM ? admSnap.data().nome : fãSnap.data().nome;
                
                document.getElementById('app').style.display = 'flex';
                document.getElementById('user-display-name').innerText = `Olá, ${currentUserNome}`;

                if (isUserADM) {
                    document.getElementById('menu-btn').style.display = 'block';
                    document.getElementById('admin-controls').style.display = 'block';
                    document.getElementById('admin-tools-extra').style.display = 'block';
                    document.getElementById('spacer').style.display = 'none';
                    carregarLogs();
                }

                carregarMensagens();
                carregarInteracao();
            } else {
                alert("E-mail não autorizado.");
                sair();
            }
        });

        // FUNÇÃO PARA CRIAR ENQUETE (SÓ ADMIN)
        window.criarEnquete = async () => {
            const p = document.getElementById('pollQuest').value;
            const o1 = document.getElementById('pollOpt1').value;
            const o2 = document.getElementById('pollOpt2').value;
            if(p && o1 && o2) {
                await addDoc(collection(db, "interacoes"), {
                    pergunta: p,
                    opcoes: [o1, o2],
                    votos: [0, 0],
                    ativa: true,
                    criadoEm: serverTimestamp()
                });
                alert("Enquete lançada!");
                toggleMenu();
            }
        };

        function carregarInteracao() {
            const q = query(collection(db, "interacoes"), orderBy("criadoEm", "desc"));
            onSnapshot(q, (s) => {
                if(!s.empty) {
                    const data = s.docs[0].data();
                    const id = s.docs[0].id;
                    if(data.ativa) {
                        document.getElementById('interacao-topo').style.display = 'block';
                        document.getElementById('interacao-pergunta').innerText = data.pergunta;
                        let html = "";
                        data.opcoes.forEach((opt, index) => {
                            html += `<button class="btn-voto" onclick="votar('${id}', ${index})">${opt} (${data.votos[index]})</button>`;
                        });
                        document.getElementById('interacao-opcoes').innerHTML = html;
                    }
                }
            });
        }

        window.votar = async (id, index) => {
            const ref = doc(db, "interacoes", id);
            const field = `votos.${index}`; // Erro comum: Firestore precisa de lógica específica para arrays, mas aqui usaremos campo direto se preferir ou update simples.
            // Para simplificar, vamos atualizar o array (em produção usaria arrayUnion, mas aqui incrementaremos a posição):
            const docSnap = await getDoc(ref);
            let novosVotos = docSnap.data().votos;
            novosVotos[index] += 1;
            await updateDoc(ref, { votos: novosVotos });
        };

        // MENSAGENS E LOGS (IGUAIS ANTERIOR)
        async function enviar() {
            const input = document.getElementById('msgInput');
            if (input.value.trim()) {
                await addDoc(collection(db, "mensagens"), {
                    texto: input.value,
                    autor: currentUserNome,
                    isAdmin: true,
                    tempo: serverTimestamp()
                });
                input.value = "";
            }
        }

        function carregarMensagens() {
            const q = query(collection(db, "mensagens"), orderBy("tempo", "desc"));
            onSnapshot(q, (s) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                s.forEach(d => {
                    const data = d.data();
                    const colorClass = data.isAdmin ? 'is-admin-true' : 'is-admin-false';
                    container.innerHTML += `<div class="bubble ${colorClass}"><span class="author-tag">${data.autor}</span>${data.texto}</div>`;
                });
            });
        }

        function carregarLogs() {
            const q = query(collection(db, "logs"), orderBy("data", "desc"));
            onSnapshot(q, (s) => {
                const list = document.getElementById('logs-list');
                list.innerHTML = "";
                s.forEach(d => {
                    const l = d.data();
                    list.innerHTML += `<div class="log-item">👤 <b>${l.nome}</b> entrou.</div>`;
                });
            });
        }

        window.toggleMenu = () => {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('overlay');
            menu.classList.toggle('open');
            overlay.style.display = menu.classList.contains('open') ? 'block' : 'none';
        }

        document.getElementById('sendBtn').onclick = enviar;
        window.sair = () => signOut(auth).then(() => window.location.href = "../login/");
    </script>
</body>
</html>
