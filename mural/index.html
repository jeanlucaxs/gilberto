<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural do Gilberto | Exclusivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #075e54;
            --accent: #25d366;
            --bg-chat: #e5ddd5;
            --white: #ffffff;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            background: var(--bg-chat);
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        #app { 
            display: none; 
            flex-direction: column; 
            width: 100%; 
            max-width: 600px; 
            background: var(--white);
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }

        /* HEADER */
        header { 
            background: var(--primary); 
            color: white; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            z-index: 10;
        }
        header h2 { margin: 0; font-size: 1.1rem; font-weight: 600; }
        .btn-sair { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }

        /* PAINEL ADMIN (LOGS) */
        #admin-stats { 
            display: none; 
            background: #f8f9fa; 
            border-bottom: 2px solid var(--primary); 
            padding: 15px; 
            max-height: 200px; 
            overflow-y: auto; 
        }
        #admin-stats h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: var(--primary); }
        .log-entry { font-size: 0.75rem; color: #666; padding: 4px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }

        /* ÁREA DE MENSAGENS */
        #messages-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; /* Mensagens mais recentes no topo? Use 'column-reverse' se quiser */
            gap: 15px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
        }

        .bubble { 
            padding: 12px 16px; 
            border-radius: 15px; 
            max-width: 85%; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: relative;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bubble.admin-msg { 
            background: #dcf8c6; 
            align-self: flex-end; 
            border-top-right-radius: 2px;
        }
        .bubble.fã-msg { 
            background: var(--white); 
            align-self: flex-start; 
            border-top-left-radius: 2px;
        }
        .author-tag { font-size: 0.7rem; font-weight: 700; display: block; margin-bottom: 4px; color: var(--primary); }
        .time-tag { font-size: 0.65rem; opacity: 0.5; display: block; text-align: right; margin-top: 5px; }

        /* INPUT ADMIN */
        #admin-input-area { 
            display: none; 
            padding: 15px; 
            background: #f0f0f0; 
            gap: 10px; 
            align-items: center; 
        }
        #admin-input-area input { 
            flex: 1; 
            padding: 12px 18px; 
            border-radius: 25px; 
            border: 1px solid #ddd; 
            outline: none; 
            font-family: inherit;
        }
        #admin-input-area button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            cursor: pointer; 
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="app">
        <div id="admin-stats">
            <h3>📊 Estatísticas de Acesso</h3>
            <div id="logs-list">Aguardando novos dados...</div>
        </div>

        <header>
            <div>
                <h2>Mural do Gilberto</h2>
                <div id="status-user" style="font-size: 0.7rem; opacity: 0.8;">Verificando acesso...</div>
            </div>
            <button class="btn-sair" onclick="sair()">Sair</button>
        </header>

        <div id="messages-container">
            </div>

        <div id="admin-input-area">
            <input type="text" id="msgInput" placeholder="Mandar mensagem oficial...">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoaKpA1S75MWVJj1y3eynT3oPfVn30zDY",
            authDomain: "gilberto-a4032.firebaseapp.com",
            projectId: "gilberto-a4032",
            storageBucket: "gilberto-a4032.firebasestorage.app",
            messagingSenderId: "757870949382",
            appId: "1:757870949382:web:b7ad6e42e04a3fb874ff87"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "../login/";
                return;
            }

            // Verifica Acessos (Coleção ACESSO e ACESSOADM)
            const fãRef = doc(db, "acesso", user.email);
            const fãSnap = await getDoc(fãRef);
            const admRef = doc(db, "acessoadm", user.email);
            const admSnap = await getDoc(admRef);

            const isADM = admSnap.exists();
            const isFã = fãSnap.exists() && fãSnap.data().autorizado === true;

            if (isADM || isFã) {
                document.getElementById('app').style.display = 'flex';
                document.getElementById('status-user').innerText = `Logado como: ${user.displayName}`;

                // Registrar LOG (Só uma vez por sessão seria o ideal, aqui gera cada refresh)
                addDoc(collection(db, "logs"), { nome: user.displayName, email: user.email, data: serverTimestamp() });

                if (isADM) {
                    document.getElementById('admin-input-area').style.display = 'flex';
                    document.getElementById('admin-stats').style.display = 'block';
                    carregarLogs();
                }

                carregarMensagens();
            } else {
                alert("Seu e-mail não foi autorizado para ver o mural.");
                sair();
            }
        });

        function carregarMensagens() {
            // "desc" faz com que a MAIS RECENTE apareça primeiro (no topo)
            const q = query(collection(db, "mensagens"), orderBy("tempo", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const d = doc.data();
                    const b = document.createElement('div');
                    const isGilberto = d.autor === 'Gilberto';
                    b.classList.add('bubble', isGilberto ? 'admin-msg' : 'fã-msg');

                    const hora = d.tempo ? new Date(d.tempo.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';

                    b.innerHTML = `
                        <span class="author-tag">${d.autor}</span>
                        ${d.texto}
                        <span class="time-tag">${hora}</span>
                    `;
                    container.appendChild(b);
                });
            });
        }

        function carregarLogs() {
            const q = query(collection(db, "logs"), orderBy("data", "desc"));
            onSnapshot(q, (s) => {
                const list = document.getElementById('logs-list');
                list.innerHTML = "";
                s.forEach(d => {
                    const l = d.data();
                    const dt = l.data ? new Date(l.data.seconds * 1000).toLocaleString('pt-BR') : '...';
                    list.innerHTML += `<div class="log-entry"><span><b>${l.nome}</b></span> <span>${dt}</span></div>`;
                });
            });
        }

        document.getElementById('sendBtn').onclick = enviar;
        document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });

        async function enviar() {
            const input = document.getElementById('msgInput');
            if(input.value.trim() !== "") {
                await addDoc(collection(db, "mensagens"), {
                    texto: input.value,
                    autor: "Gilberto",
                    tempo: serverTimestamp()
                });
                input.value = "";
            }
        }

        window.sair = () => signOut(auth).then(() => window.location.href = "../login/");
    </script>
</body>
</html>
