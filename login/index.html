<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mural do Gilberto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f4f7f6; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 350px; }
        .btn-google { background: white; border: 1px solid #ddd; padding: 12px 24px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 600; width: 100%; transition: 0.3s; }
        .btn-google:hover { background: #eee; }
        img { width: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Mural Exclusivo</h2>
        <p>Olá! Para acessar o mural do Gilberto, conecte sua conta Google abaixo.</p>
        <button class="btn-google" id="loginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Entrar com Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoaKpA1S75MWVJj1y3eynT3oPfVn30zDY",
            authDomain: "gilberto-a4032.firebaseapp.com",
            projectId: "gilberto-a4032",
            storageBucket: "gilberto-a4032.firebasestorage.app",
            messagingSenderId: "757870949382",
            appId: "1:757870949382:web:b7ad6e42e04a3fb874ff87"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('loginBtn').onclick = () => {
            signInWithPopup(auth, provider)
                .then(() => {
                    // Redireciona para a pasta do mural (sobe um nível e entra em mural)
                    window.location.href = "../mural/"; 
                })
                .catch(err => {
                    console.error(err);
                    alert("Erro ao logar. Verifique se o pop-up não foi bloqueado.");
                });
        };
    </script>
</body>
</html>
